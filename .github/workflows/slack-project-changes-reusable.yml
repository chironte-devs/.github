name: Notify Slack on Project Status Changes (reusable)

on:
  workflow_call:
    inputs:
      org:
        required: true
        type: string
      project_number:
        required: true
        type: number
      slack_channel_id:
        required: true
        type: string
      repo_name:
        required: true
        type: string
    secrets:
      SLACK_BOT_TOKEN:
        required: true
      GH_PROJECTS_TOKEN:
        required: true

jobs:
  diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      issues: read
      pull-requests: read

    steps:
      - name: Checkout (for cache key context only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore snapshot cache
        id: cache
        uses: actions/cache@v4
        with:
          path: .project-snapshot.json
          key: project-snapshot-${{ inputs.org }}-${{ inputs.project_number }}

      - name: Fetch project items and diff
        id: diff
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PROJECTS_TOKEN || github.token }}
          script: |
            const fs = require('fs');
            const org = '${{ inputs.org }}';
            const projectNumber = Number('${{ inputs.project_number }}');

            async function gql(query, variables) {
              const res = await github.graphql(query, variables);
              return res;
            }

            // Fetch project + items (paged)
            const q = `
              query($org:String!, $number:Int!, $after:String) {
                organization(login:$org) {
                  projectV2(number:$number) {
                    id
                    title
                    items(first: 100, after: $after) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        id
                        updatedAt
                        content {
                          __typename
                          ... on Issue { id number title url state repository { name } }
                          ... on PullRequest { id number title url state repository { name } }
                        }
                        fieldValues(first: 50) {
                          nodes {
                            __typename
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              field { ... on ProjectV2SingleSelectField { name } }
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            let after = null;
            let items = [];
            while (true) {
              const data = await gql(q, { org, number: projectNumber, after });
              const page = data.organization.projectV2.items;
              items = items.concat(page.nodes);
              if (!page.pageInfo.hasNextPage) break;
              after = page.pageInfo.endCursor;
            }

            function getStatus(item) {
              for (const fv of item.fieldValues.nodes) {
                if (fv.__typename === 'ProjectV2ItemFieldSingleSelectValue' && fv.field?.name === 'Status') {
                  return fv.name || null;
                }
              }
              return null;
            }

            // Build current snapshot: key by content id when possible, else by item id
            const current = {};
            for (const it of items) {
              const content = it.content;
              const key = (content && content.id) ? content.id : it.id;
              const repo = content?.repository?.name || null;
              current[key] = {
                key,
                itemId: it.id,
                updatedAt: it.updatedAt,
                type: content?.__typename || 'Draft',
                title: content?.title || '(draft)',
                url: content?.url || '',
                number: content?.number || null,
                state: content?.state || null,
                repo,
                status: getStatus(it),
              };
            }

            // Load previous snapshot
            let prev = {};
            if (fs.existsSync('.project-snapshot.json')) {
              try { prev = JSON.parse(fs.readFileSync('.project-snapshot.json', 'utf8')); } catch {}
            }

            const changes = [];
            for (const [k, cur] of Object.entries(current)) {
              const old = prev[k];
              if (!old) continue;
              if ((old.status || null) !== (cur.status || null)) {
                changes.push({
                  key: k,
                  repo: cur.repo,
                  title: cur.title,
                  url: cur.url,
                  from: old.status,
                  to: cur.status,
                  type: cur.type,
                  number: cur.number,
                });
              }
            }

            // Save current snapshot for next run
            fs.writeFileSync('.project-snapshot.json', JSON.stringify(current, null, 2));

            core.setOutput('changeCount', String(changes.length));
            core.setOutput('changes', JSON.stringify(changes.slice(0, 20))); // cap
            const lines = changes.slice(0,20).map(c => `• ${c.from||'∅'} → *${c.to||'∅'}* — <${c.url}|${c.type}${c.number?(' #'+c.number):''}: ${c.title}>`);
            core.setOutput('changesMrkdwn', lines.join('\n'));

      - name: Post changes to Slack
        if: steps.diff.outputs.changeCount != '0'
        uses: slackapi/slack-github-action@v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ inputs.slack_channel_id }}"
            text: "Project status updates"
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "Project updates — ${{ inputs.repo_name }}"
              - type: section
                text:
                  type: mrkdwn
                  text: "Detected *${{ steps.diff.outputs.changeCount }}* status change(s) in the Project."
              - type: section
                text:
                  type: mrkdwn
                  text: |
                    ${{ steps.diff.outputs.changesMrkdwn }}
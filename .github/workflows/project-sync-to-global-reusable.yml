name: Sync repo Project → Global Project (reusable)

on:
  workflow_call:
    inputs:
      org:
        required: true
        type: string
      repo_project_number:
        required: true
        type: number
      global_project_number:
        required: true
        type: number
      # Which field to sync from the repo project
      repo_status_field_name:
        required: false
        type: string
        default: Status
      # Which field to write in the global project
      global_status_field_name:
        required: false
        type: string
        default: Status
    secrets:
      GH_PROJECTS_TOKEN:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Sync statuses (repo → global)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PROJECTS_TOKEN }}
          script: |
            const org = '${{ inputs.org }}';
            const repoProjectNumber = Number('${{ inputs.repo_project_number }}');
            const globalProjectNumber = Number('${{ inputs.global_project_number }}');
            const repoFieldName = '${{ inputs.repo_status_field_name }}';
            const globalFieldName = '${{ inputs.global_status_field_name }}';

            // Normalization between boards (handle capitalization differences)
            const norm = (s) => (s||'').trim().toLowerCase();
            const statusMap = {
              'backlog': 'Backlog',
              'ready': 'Ready',
              'in progress': 'In progress',
              'inprogress': 'In progress',
              'review': 'In review',
              'in review': 'In review',
              'done': 'Done',
              'blocked': 'Blocked',
            };

            async function gql(query, variables) {
              return await github.graphql(query, variables);
            }

            async function fetchProject(orgLogin, number) {
              const q = `
                query($org:String!, $n:Int!){
                  organization(login:$org){
                    projectV2(number:$n){
                      id
                      title
                      fields(first:50){
                        nodes{
                          __typename
                          ... on ProjectV2FieldCommon { id name }
                          ... on ProjectV2SingleSelectField { id name options { id name } }
                        }
                      }
                    }
                  }
                }
              `;
              const d = await gql(q, { org: orgLogin, n: number });
              const p = d.organization.projectV2;
              if (!p) throw new Error(`ProjectV2 not found: ${orgLogin} #${number}`);
              return p;
            }

            function findSingleSelect(project, fieldName) {
              for (const f of project.fields.nodes) {
                if (f.__typename === 'ProjectV2SingleSelectField' && f.name === fieldName) {
                  return f;
                }
              }
              return null;
            }

            async function fetchAllItems(projectId) {
              const q = `
                query($id:ID!, $after:String){
                  node(id:$id){
                    ... on ProjectV2 {
                      items(first:100, after:$after){
                        pageInfo{hasNextPage endCursor}
                        nodes{
                          id
                          content{
                            __typename
                            ... on Issue { id number title url repository { name } }
                            ... on PullRequest { id number title url repository { name } }
                          }
                          fieldValues(first:50){
                            nodes{
                              __typename
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                field { ... on ProjectV2SingleSelectField { id name } }
                                name
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              let after = null;
              let out = [];
              while (true) {
                const d = await gql(q, { id: projectId, after });
                const items = d.node.items;
                out = out.concat(items.nodes);
                if (!items.pageInfo.hasNextPage) break;
                after = items.pageInfo.endCursor;
              }
              return out;
            }

            function getFieldValueName(item, fieldName) {
              for (const fv of item.fieldValues.nodes) {
                if (fv.__typename === 'ProjectV2ItemFieldSingleSelectValue' && fv.field?.name === fieldName) {
                  return fv.name || null;
                }
              }
              return null;
            }

            async function addItemToProject(projectId, contentId) {
              const m = `
                mutation($projectId:ID!, $contentId:ID!){
                  addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}){
                    item { id }
                  }
                }
              `;
              const d = await gql(m, { projectId, contentId });
              return d.addProjectV2ItemById.item.id;
            }

            async function updateSingleSelect(projectId, itemId, fieldId, optionId) {
              const m = `
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $opt:String!){
                  updateProjectV2ItemFieldValue(input:{
                    projectId:$projectId,
                    itemId:$itemId,
                    fieldId:$fieldId,
                    value:{ singleSelectOptionId: $opt }
                  }){ projectV2Item { id } }
                }
              `;
              await gql(m, { projectId, itemId, fieldId, opt: optionId });
            }

            // Load projects
            const repoProj = await fetchProject(org, repoProjectNumber);
            const globalProj = await fetchProject(org, globalProjectNumber);

            const repoField = findSingleSelect(repoProj, repoFieldName);
            if (!repoField) throw new Error(`Repo project missing single-select field '${repoFieldName}'`);

            const globalField = findSingleSelect(globalProj, globalFieldName);
            if (!globalField) throw new Error(`Global project missing single-select field '${globalFieldName}'`);

            const globalOptByName = new Map(globalField.options.map(o => [norm(o.name), o.id]));

            // Fetch items
            const repoItems = await fetchAllItems(repoProj.id);
            const globalItems = await fetchAllItems(globalProj.id);

            // Build lookup: content.id -> global item.id
            const globalByContentId = new Map();
            for (const it of globalItems) {
              const cid = it.content?.id;
              if (cid) globalByContentId.set(cid, it.id);
            }

            let changed = 0, added = 0, skipped = 0;

            for (const it of repoItems) {
              const content = it.content;
              if (!content?.id) continue;

              const rawStatus = getFieldValueName(it, repoFieldName);
              if (!rawStatus) { skipped++; continue; }

              const mapped = statusMap[norm(rawStatus)] || rawStatus;
              const optId = globalOptByName.get(norm(mapped));
              if (!optId) { skipped++; continue; }

              let globalItemId = globalByContentId.get(content.id);
              if (!globalItemId) {
                // add item first
                globalItemId = await addItemToProject(globalProj.id, content.id);
                globalByContentId.set(content.id, globalItemId);
                added++;
              }

              // We don't read current global field value to reduce queries; update is idempotent.
              await updateSingleSelect(globalProj.id, globalItemId, globalField.id, optId);
              changed++;
            }

            core.summary
              .addHeading('Project sync (repo → global)')
              .addTable([
                ['repoProject', `${repoProjectNumber} (${repoProj.title})`],
                ['globalProject', `${globalProjectNumber} (${globalProj.title})`],
                ['updated', String(changed)],
                ['addedToGlobal', String(added)],
                ['skipped', String(skipped)],
              ])
              .write();
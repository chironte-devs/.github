name: Migrate Global Project Status from LegacyWorkflow

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Copy LegacyWorkflow -> Status (Project #1)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PROJECTS_TOKEN }}
          script: |
            const org='chironte-devs';
            const projectNumber=1;
            const fromField='LegacyWorkflow';
            const toField='Status';

            const norm = (s) => (s||'').trim().toLowerCase();
            const map = {
              'in progress':'in progress',
              'in progress ':'in progress',
              'in progress\n':'in progress',
              'in progress':'in progress',
              'in progress':'in progress',
              'in progress':'in progress',
              'in progress':'in progress',
              'in progress':'in progress',
              'in progress':'in progress',
              'in progress':'in progress',
              'in progress':'in progress',
              'in progress':'in progress',
              'in progress':'in progress',
            };
            // explicit mapping old option capitalization
            const mapName = {
              'backlog':'Backlog',
              'ready':'Ready',
              'in progress':'In Progress',
              'in progress ':'In Progress',
              'in progress':'In Progress',
              'in review':'Review',
              'review':'Review',
              'blocked':'Blocked',
              'done':'Done',
            };

            async function gql(query, variables){ return await github.graphql(query, variables); }

            const qProj = `
              query($org:String!, $n:Int!){
                organization(login:$org){
                  projectV2(number:$n){
                    id title
                    fields(first:50){
                      nodes{
                        __typename
                        ... on ProjectV2SingleSelectField { id name options { id name } }
                      }
                    }
                  }
                }
              }
            `;
            const proj = (await gql(qProj,{org,n:projectNumber})).organization.projectV2;
            const fields = proj.fields.nodes.filter(f=>f.__typename==='ProjectV2SingleSelectField');
            const from = fields.find(f=>f.name===fromField);
            const to = fields.find(f=>f.name===toField);
            if(!from) throw new Error('missing fromField '+fromField);
            if(!to) throw new Error('missing toField '+toField);
            const toOpt = new Map(to.options.map(o=>[norm(o.name), o.id]));

            async function fetchItems(projectId){
              const q=`
                query($id:ID!, $after:String){
                  node(id:$id){
                    ... on ProjectV2 {
                      items(first:100, after:$after){
                        pageInfo{hasNextPage endCursor}
                        nodes{
                          id
                          content{ __typename ... on Issue { id title url } ... on PullRequest { id title url } }
                          fieldValues(first:50){
                            nodes{
                              __typename
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                field { ... on ProjectV2SingleSelectField { name } }
                                name
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              let after=null, out=[];
              while(true){
                const d=await gql(q,{id:projectId,after});
                const it=d.node.items;
                out=out.concat(it.nodes);
                if(!it.pageInfo.hasNextPage) break;
                after=it.pageInfo.endCursor;
              }
              return out;
            }

            function getVal(item, fieldName){
              for(const fv of item.fieldValues.nodes){
                if(fv.__typename==='ProjectV2ItemFieldSingleSelectValue' && fv.field?.name===fieldName) return fv.name||null;
              }
              return null;
            }

            async function setVal(projectId,itemId,fieldId,optId){
              const m=`
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $opt:String!){
                  updateProjectV2ItemFieldValue(input:{projectId:$projectId,itemId:$itemId,fieldId:$fieldId,value:{singleSelectOptionId:$opt}}){
                    projectV2Item{ id }
                  }
                }
              `;
              await gql(m,{projectId,itemId,fieldId,opt:optId});
            }

            const items = await fetchItems(proj.id);
            let migrated=0, skipped=0;
            for(const it of items){
              const curTo=getVal(it,toField);
              if(curTo){ skipped++; continue; }
              const curFrom=getVal(it,fromField);
              if(!curFrom){ skipped++; continue; }
              const mapped = mapName[norm(curFrom)] || curFrom;
              const optId = toOpt.get(norm(mapped));
              if(!optId){ skipped++; continue; }
              await setVal(proj.id,it.id,to.id,optId);
              migrated++;
            }

            core.summary.addHeading('Migration LegacyWorkflow → Status')
              .addTable([
                ['project', `${projectNumber} (${proj.title})`],
                ['migrated', String(migrated)],
                ['skipped', String(skipped)],
              ]).write();
